# Main Nginx configuration with caching for static assets including videos
worker_processes auto;

events {
  worker_connections 1024; # Number of simultaneous connections per worker
}

server {
  listen 80;
  server_name illoprin.ru www.illoprin.ru;

  # Permanent redirect to HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name dnd-finder.ru www.dnd-finder.ru;
  root /var/www/html;
  index index.php index.html;
  client_max_body_size 10M;

  # SSL optimization settings
  ssl_session_cache shared:SSL:10m; # Shared SSL session cache
  ssl_session_timeout 10m; # SSL session timeout
  ssl_protocols TLSv1.2 TLSv1.3; # Allowed SSL/TLS protocols
  ssl_prefer_server_ciphers on; # Prefer server's cipher preference
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

  # SSL certificate paths (replace with your actual paths)
  ssl_certificate /etc/letsencrypt/live/www.dnd-finder.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.dnd-finder.ru/privkey.pem;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # Some headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

  # Static files - long cache
  location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Protect config files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
  location ~ /(config\.php|\.env|composer\.json|composer\.lock) {
    deny all;
    access_log off;
    log_not_found off;
  }

  # PHP process
  location ~ \.php$ {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass php:9000;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;

    # PHP timeouts
    fastcgi_read_timeout 300;
    fastcgi_send_timeout 300;
  }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }
}