# Перенаправление с HTTP на HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name dnd-finder.ru www.dnd-finder.ru;

  return 301 https://dnd-finder.ru$request_uri;
}

# Перенаправление с www.dnd-finder.ru на dnd-finder.ru (SEO-оптимизация)
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.dnd-finder.ru;

  ssl_certificate /etc/letsencrypt/live/dnd-finder.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dnd-finder.ru/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  return 301 https://dnd-finder.ru$request_uri;
}

# Основной боевой сервер
server {
  listen 443 ssl;
  listen [::]:443 ssl; # Поддержка IPv6
  http2 on;
  server_name dnd-finder.ru;

  root /var/www/html;
  index index.php index.html;

  # Логи (лучше разделить для каждого сайта)
  access_log /var/log/nginx/dnd-finder.access.log;
  error_log /var/log/nginx/dnd-finder.error.log warn;

  # SSL Сертификаты
  ssl_certificate /etc/letsencrypt/live/dnd-finder.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/dnd-finder.ru/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # Безопасность: Защита от кликджекинга, XSS и подмены типов
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "upgrade-insecure-requests" always;

  # Сжатие Gzip
  gzip on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Главная точка входа
  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  # Обработка PHP
  location ~ \.php$ {
    # Защита от уязвимости nbc-01 (запуск PHP кода из картинок)
    try_files $uri =404;
    
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass php:9000;
    fastcgi_index index.php;
    
    # Оптимизация буферов (снижает нагрузку на диск при больших ответах PHP)
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
    
    # Таймауты
    fastcgi_read_timeout 60; # 300 сек для продакшена обычно много, если только нет тяжелого импорта
  }

  # Кеширование статики (сжатие на лету или отдача готовой)
  location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    expires 30d; # Для продакшена лучше поставить 30 дней или год
    add_header Cache-Control "public, no-transform, max-age=2592000";
    access_log off;
    log_not_found off;
    try_files $uri =404;
  }

  # Запрет доступа к скрытым файлам, конфигурациям, логам, дампам
  location ~ /\.(?!well-known).* {
    deny all;
  }

  location ~* \.(local|env|nginx|htaccess|git|conf|sql|bak|log)$ {
    deny all;
  }
}