services:

  mysql:
    image: mysql:8.0
    container_name: dndfinder_mysql
    environment:
      MYSQL_ROOT_PASSWORD: very_strong_password
      MYSQL_DATABASE: dndfinder
      MYSQL_USER: dndfinder_user
      MYSQL_PASSWORD: dndfinder_password
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p$$MYSQL_ROOT_PASSWORD",
        ]
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - dndfinder_network

  php:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: dndfinder_php
    volumes:
      - ./src:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'PHP is running';"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dndfinder_network

  nginx-prod:
    image: nginx:alpine
    container_name: dndfinder_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      php:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dndfinder_network

networks:
  dndfinder_network:
    driver: bridge